name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fails the build if anything that looks like a secret (private key,
  # API token, DB connection string, etc.) is committed to the repo or
  # to git history. Uses the gitleaks default ruleset; project-specific
  # rules and false-positive allowlists go in `.gitleaks.toml`. Runs on
  # PRs against the diff vs. base, and on pushes against full history.
  secret-scan:
    name: Secret scan · gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the scan covers every commit
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true

  contracts:
    name: Contracts · forge test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: |
          forge install OpenZeppelin/openzeppelin-contracts@v5.1.0 --no-git || true
          forge install foundry-rs/forge-std --no-git || true

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test
        run: FOUNDRY_PROFILE=ci forge test -vvv

  web:
    name: Web · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      # Audit L6: non-blocking dependency vulnerability scan (web).
      - name: npm audit (advisory)
        run: npm audit --audit-level=high --omit=dev || true

  server:
    name: Server · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/server/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Audit L6: non-blocking dependency vulnerability scan.
      # `--audit-level=high` only fails on High/Critical CVEs.
      # `|| true` keeps it advisory until we triage the noise; flip to
      # required-required after the first clean pass.
      - name: npm audit (advisory)
        run: npm audit --audit-level=high --omit=dev || true
